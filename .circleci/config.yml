version: 2
references:
  node_container: &node_container
    docker:
      - image: cnadiminti/dynamodb-local:latest

jobs:
  build:
    <<: *node_container

    steps:
      - checkout

      - run:
          name: Authenticate with Artifactory
          command: curl -ks -u$DOCKER_USER:$DOCKER_PASS "https://d2lartifacts.jfrog.io/artifactory/api/npm/npm-local/auth/d2l" -o ~/project/.npmrc

      - run:
          name: Install dependencies and run tests
          command: |
            export NVM_DIR="/opt/circleci/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"  # This loads nvm bash_completion
            nvm install 10
            nvm alias default 10
            if [ ! -d node_modules ]; then
              npm ci
            fi
            npm run ci

      - persist_to_workspace:
          root: ~/project
          paths: .

  deploy:
    machine: true

    steps:
      - attach_workspace:
          at: ~/project

      - run:
          command: |
            docker login --username=$DOCKER_USER --password=$DOCKER_PASS d2lartifacts-dockerv2-local.jfrog.io
            npm install -g publish
            publish

workflows:
  version: 2

  build-and-publish:
    jobs:
      - build
      - deploy:
          requires:
            - build
          filters:
            branches:
              only:
                - master
