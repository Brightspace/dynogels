name: Build and publish
on: [push]
env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  AWS_DEFAULT_OUTPUT: json
  GITHUB_ACTIONS_SHA: ${{ github.sha }}
  GITHUB_ACTIONS_USERNAME: ${{ github.repository_owner }}
  GITHUB_ACTIONS_RUN_NUMBER: ${{ github.run_number }}
  GITHUB_ACTIONS_BRANCH: ${{ github.ref_name }}
  GITHUB_ACTIONS_RUN_OFFSET: 100000
jobs:
  build:
    runs-on: [self-hosted, Linux, AWS]
    timeout-minutes: 10
    steps:
      - name: Persist Workspace
        uses: Brightspace/third-party-actions@actions/cache
        with:
          path: |
            ./*
          key: worksapce-v1-${{ github.sha }}

      - name: Checkout
        uses: Brightspace/third-party-actions@actions/checkout

      - name: Start docker containers
        run: docker-compose -f ./dev/docker-compose.yml up -d dynamodb

      - name: Setup Node
        uses: Brightspace/third-party-actions@actions/setup-node
        with:
          node-version: '14'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  deploy:
    if: ${{ github.ref_name == 'master' }}
    runs-on: [self-hosted, Linux, AWS]
    timeout-minutes: 10
    steps:
      - name: Persist Workspace
        uses: Brightspace/third-party-actions@actions/cache
        with:
          path: |
            ./*
          key: worksapce-v1-${{ github.sha }}

      - name: Setup node
        uses: Brightspace/third-party-actions@actions/setup-node
        with:
          node-version: 14
          cache: npm

      - name: Publish to npm public registry
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken ${NPM_TOKEN}
          npm publish
