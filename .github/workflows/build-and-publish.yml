name: Build and publish
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: Brightspace/third-party-actions@actions/checkout
        with:
          persist-credentials: false

      - name: Setup Node
        uses: Brightspace/setup-node@main
        with:
          node-version: '14'
          cache: npm
          d2l-registry-token: ${{ secrets.D2L_PACKAGE_REGISTRY_AUTH_TOKEN }}

      - name: Persist Workspace
        uses: Brightspace/third-party-actions@actions/cache
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: setup-docker
        uses: docker-practice/actions-setup-docker@1.0.9

      - name: Start docker containers
        run: docker-compose -f ./dev/docker-compose.yml up -d dynamodb

      - name: Install Dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  deploy:
    if: ${{ github.ref_name == 'master' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: Brightspace/third-party-actions@actions/checkout
        with:
          persist-credentials: false

      - name: Setup node
        uses: Brightspace/setup-node@main
        with:
          node-version: 20
          d2l-registry-token: ${{ secrets.D2L_PACKAGE_REGISTRY_AUTH_TOKEN }}

      - name: Semantic Release
        uses: BrightspaceUI/actions/semantic-release@main
        with:
          DEFAULT_BRANCH: master
          GITHUB_TOKEN: ${{ secrets.D2L_RELEASE_TOKEN }}
          NPM: true
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
